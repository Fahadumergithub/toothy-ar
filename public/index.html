<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toothy AR â€” Deep Diagnostic</title>
<style>
  body { background:#0a0a0f; color:#e8e8f0; font-family:'Space Mono',monospace; padding:20px; font-size:13px; }
  pre  { background:#13131a; border:1px solid #1e1e2e; padding:14px; border-radius:6px; white-space:pre-wrap; word-break:break-all; margin:6px 0; }
  h3   { color:#00e5ff; margin:18px 0 6px; }
  .ok  { color:#51cf66; } .warn { color:#ffd43b; } .err { color:#ff3d71; }
  button { background:#00e5ff; color:#000; border:none; padding:12px 28px; border-radius:4px;
           font-family:'Space Mono',monospace; font-weight:700; cursor:pointer; margin:6px 4px; letter-spacing:1px; }
</style>
</head>
<body>
<h2>đź¦· Toothy AR â€” Deep Model Diagnostic</h2>
<p style="color:#5a5a7a">This will tell us exactly what predict() returns and where the data lives.</p>
<button onclick="runDiag()">â–¶ Run Diagnostic</button>
<div id="out"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/tf-tflite.min.js"></script>
<script>
const MODEL_URL = 'https://huggingface.co/fahadumer/toothy-ar/resolve/main/best_float32.tflite';

function log(msg, cls='') {
  document.getElementById('out').innerHTML += `<pre class="${cls}">${msg}</pre>`;
}
function h(t) {
  document.getElementById('out').innerHTML += `<h3>${t}</h3>`;
}

async function runDiag() {
  document.getElementById('out').innerHTML = '';
  tflite.setWasmPath('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/');
  await tf.ready();
  log('TF backend: ' + tf.getBackend(), 'ok');

  h('Step 1 â€” Load model');
  let m;
  try {
    m = await tflite.loadTFLiteModel(MODEL_URL);
    log('âś… Model loaded', 'ok');
  } catch(e) { log('âťŚ LOAD FAILED: ' + e, 'err'); return; }

  h('Step 2 â€” Inspect raw predict() return value');
  const inp = tf.randomUniform([1, 640, 640, 3], 0, 1);
  const raw = m.predict(inp);

  log('typeof result: ' + typeof raw);
  log('Is Array: ' + Array.isArray(raw));
  log('Is Tensor: ' + (raw instanceof tf.Tensor));

  // Check if it's a named map
  if (typeof raw === 'object' && !Array.isArray(raw) && !(raw instanceof tf.Tensor)) {
    const keys = Object.keys(raw);
    log('âš ď¸Ź  Result is a NAMED TENSOR MAP with keys: ' + JSON.stringify(keys), 'warn');
    log('This means model.predict() returns {outputName: Tensor} not a plain Tensor', 'warn');
    log('You must access raw["' + keys[0] + '"] to get the actual tensor', 'warn');

    h('Step 3 â€” Inspect each named output');
    for (const k of keys) {
      const t = raw[k];
      log(`Key "${k}":  shape=${JSON.stringify(t.shape)}  dtype=${t.dtype}`);
      const d = t.dataSync();
      const nz = Array.from(d).filter(v => v !== 0).length;
      const mn = Math.min(...d).toFixed(5);
      const mx = Math.max(...d).toFixed(5);
      const mean = (Array.from(d).reduce((a,b)=>a+b,0)/d.length).toFixed(5);
      log(`  total values=${d.length}  non-zero=${nz}  min=${mn}  max=${mx}  mean=${mean}`);

      if (t.shape.length === 3) {
        const [B, R, C] = t.shape;
        log(`  â†’ YOLOv8 layout [batch=${B}, rows=${R}, anchors=${C}]`);
        log(`  â†’ rows 0-3 = box coords, rows 4-${R-1} = ${R-4} class scores`);
        log('  â†’ Row-by-row summary:');
        for (let r = 0; r < R; r++) {
          const rowVals = [];
          for (let c = 0; c < C; c++) rowVals.push(d[r*C+c]);
          const rMn = Math.min(...rowVals).toFixed(4);
          const rMx = Math.max(...rowVals).toFixed(4);
          const rNZ = rowVals.filter(v=>v!==0).length;
          const sample = rowVals.slice(0,5).map(v=>v.toFixed(3)).join(', ');
          log(`    row[${String(r).padStart(2)}]: min=${rMn} max=${rMx} non-zero=${rNZ}/${C}  sample=[${sample}]`);
        }
      }
      t.dispose();
    }
  } else {
    // It's a plain tensor or array
    const t = Array.isArray(raw) ? raw[0] : raw;
    log('âś… Result is a plain Tensor (or array[0])', 'ok');
    log(`shape=${JSON.stringify(t.shape)}  dtype=${t.dtype}`);
    const d = t.dataSync();
    const nz = Array.from(d).filter(v => v !== 0).length;
    const mn = Math.min(...d).toFixed(5);
    const mx = Math.max(...d).toFixed(5);
    log(`total=${d.length}  non-zero=${nz}  min=${mn}  max=${mx}`);

    if (t.shape.length === 3) {
      const [B, R, C] = t.shape;
      log(`YOLOv8 layout: [${B}, ${R}, ${C}]`);
      for (let r = 0; r < R; r++) {
        const rowVals = [];
        for (let c = 0; c < C; c++) rowVals.push(d[r*C+c]);
        const rMn = Math.min(...rowVals).toFixed(4);
        const rMx = Math.max(...rowVals).toFixed(4);
        const rNZ = rowVals.filter(v=>v!==0).length;
        log(`  row[${String(r).padStart(2)}]: min=${rMn} max=${rMx} non-zero=${rNZ}/${C}`);
      }
    }
    if (Array.isArray(raw)) raw.forEach(t=>t.dispose()); else raw.dispose();
  }

  inp.dispose();

  h('Step 4 â€” Conclusion');
  log('Paste the output above back to Claude to get a targeted fix âś…', 'ok');
}
</script>
</body>
</html>
