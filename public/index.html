<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Toothy AR — Dental Detection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  /* ── SPLASH ── */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.6s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  .splash-logo { font-size: clamp(52px,16vw,96px); line-height:1; margin-bottom:8px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  .splash-title { font-size: clamp(28px,8vw,48px); font-weight:800; letter-spacing:-1px; margin-bottom:6px; }
  .splash-title span { color: var(--accent); }

  .splash-sub {
    font-family: 'Space Mono', monospace;
    font-size: clamp(10px,3vw,13px);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 48px;
  }

  .progress-wrap { width: min(320px,80vw); margin-bottom:16px; }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--muted);
    margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .progress-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill {
    height:100%;
    background: linear-gradient(90deg, var(--accent), #7c3aed);
    border-radius:2px; width:0%;
    transition: width 0.4s ease;
  }

  #splash-status { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); text-align:center; }

  .start-btn {
    margin-top:32px; padding:16px 48px;
    background: var(--accent); color:#000;
    border:none; border-radius:4px;
    font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; display:none;
    animation: fadeIn 0.5s ease forwards;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .start-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,229,255,0.3); }
  .start-btn:active { transform:translateY(0); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ── APP ── */
  #app { position:fixed; inset:0; display:none; flex-direction:column; }
  #app.active { display:flex; }

  #canvas-container { position:relative; flex:1; overflow:hidden; background:#000; }

  #video {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    transform:scaleX(-1);
  }
  #overlay { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  .scan-line {
    position:absolute; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity:0.6; animation: scan 3s linear infinite; pointer-events:none;
  }
  @keyframes scan { 0%{top:0%} 100%{top:100%} }

  .frame-corner { position:absolute; width:28px; height:28px; border-color:var(--accent); border-style:solid; opacity:0.7; }
  .frame-corner.tl { top:16px; left:16px; border-width:2px 0 0 2px; }
  .frame-corner.tr { top:16px; right:16px; border-width:2px 2px 0 0; }
  .frame-corner.bl { bottom:16px; left:16px; border-width:0 0 2px 2px; }
  .frame-corner.br { bottom:16px; right:16px; border-width:0 2px 2px 0; }

  #statusbar {
    position:absolute; top:0; left:0; right:0;
    padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between;
    background: linear-gradient(to bottom, rgba(10,10,15,0.8), transparent);
    pointer-events:none; z-index:10;
  }
  .brand { font-size:14px; font-weight:800; letter-spacing:-0.5px; }
  .brand span { color:var(--accent); }

  .live-pill {
    display:flex; align-items:center; gap:6px;
    background:rgba(255,61,113,0.15); border:1px solid rgba(255,61,113,0.3);
    border-radius:20px; padding:4px 10px;
    font-family:'Space Mono',monospace; font-size:10px; color:var(--accent2); letter-spacing:1px;
  }
  .live-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); animation:blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  #cam-toggle {
    position:absolute; top:12px; right:16px;
    width:40px; height:40px;
    background:rgba(30,30,46,0.9); border:1px solid var(--border);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px; z-index:15;
    transition:background 0.2s; pointer-events:all;
  }
  #cam-toggle:active { background:var(--border); }

  /* ── HUD ── */
  #hud {
    background:rgba(10,10,15,0.92);
    backdrop-filter:blur(12px);
    border-top:1px solid var(--border);
    padding:12px 16px 20px;
    flex-shrink:0;
  }
  .hud-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .hud-title { font-size:11px; font-family:'Space Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:2px; }
  .fps-badge {
    font-family:'Space Mono',monospace; font-size:11px; color:var(--accent);
    background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.2);
    padding:2px 8px; border-radius:3px;
  }

  .hud-stats { display:flex; gap:16px; align-items:flex-end; margin-bottom:10px; }
  .stat-item { display:flex; flex-direction:column; }
  .tooth-count { font-size:clamp(28px,8vw,40px); font-weight:800; color:var(--accent); line-height:1; margin-bottom:2px; }
  .tooth-count-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; }

  .detection-grid { display:flex; gap:6px; flex-wrap:wrap; }
  .det-chip {
    display:flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:3px; border:1px solid;
    font-family:'Space Mono',monospace; font-size:10px;
    opacity:0.35; transition:opacity 0.2s, transform 0.2s; white-space:nowrap;
  }
  .det-chip.active { opacity:1; transform:scale(1.05); }
  .det-chip .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

  .threshold-row { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .threshold-row label { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); white-space:nowrap; }
  .threshold-row input[type=range] { flex:1; accent-color:var(--accent); height:3px; }
  .threshold-val { font-family:'Space Mono',monospace; font-size:10px; color:var(--accent); min-width:32px; text-align:right; }

  #toast {
    position:fixed; bottom:120px; left:50%; transform:translateX(-50%);
    background:var(--accent2); color:#fff;
    padding:10px 20px; border-radius:4px;
    font-family:'Space Mono',monospace; font-size:11px;
    z-index:200; opacity:0; transition:opacity 0.3s;
    pointer-events:none; max-width:90vw; text-align:center;
  }
  #toast.show { opacity:1; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">🦷</div>
  <div class="splash-title">Toothy<span>AR</span></div>
  <div class="splash-sub">YOLOv8 · Real-time · On-device</div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Initialising…</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div id="splash-status">Loading TensorFlow.js runtime</div>
  <button class="start-btn" id="start-btn" onclick="startAR()">START DEMO</button>
</div>

<!-- APP -->
<div id="app">
  <div id="canvas-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="scan-line"></div>
    <div class="frame-corner tl"></div>
    <div class="frame-corner tr"></div>
    <div class="frame-corner bl"></div>
    <div class="frame-corner br"></div>
    <div id="statusbar">
      <div class="brand">Toothy<span>AR</span></div>
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    </div>
    <button id="cam-toggle" onclick="toggleCamera()" title="Flip camera">🔄</button>
  </div>

  <div id="hud">
    <div class="hud-top">
      <div class="hud-stats">
        <div class="stat-item">
          <div class="tooth-count" id="tooth-count">0</div>
          <div class="tooth-count-label">Teeth Found</div>
        </div>
        <div class="stat-item" style="margin-bottom:4px">
          <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">Avg Conf</div>
          <div style="font-family:'Space Mono',monospace;font-size:14px;color:var(--text)" id="avg-conf">—</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="fps-badge" id="fps-badge">0 FPS</div>
        <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)" id="inf-time">— ms</div>
      </div>
    </div>
    <div class="threshold-row">
      <label>CONF</label>
      <input type="range" id="threshold-slider" min="10" max="90" value="40" oninput="updateThreshold(this.value)">
      <div class="threshold-val" id="threshold-val">0.40</div>
    </div>
    <div style="height:8px"></div>
    <div class="hud-title" style="margin-bottom:6px">DETECTIONS</div>
    <div class="detection-grid" id="detection-grid"></div>
  </div>
</div>

<div id="toast"></div>

<!-- TF.js core (no version pin) -->
<!-- TF.js core -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<!-- CPU backend -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-cpu"></script>
<!-- TFLite alpha.8 — confirmed working version -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.8/dist/tf-tflite.min.js"></script>
<script>
// Set WASM path so tflite can find its worker files from CDN
if (typeof tflite !== 'undefined') {
  tflite.setWasmPath('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.8/dist/');
}
</script>
<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const MODEL_URL    = 'https://huggingface.co/fahadumer/toothy-ar/resolve/main/best_float32.tflite';
const INPUT_SIZE   = 640;
const IOU_THRESH   = 0.45;
const MAX_DETS     = 30;

const CLASSES = [
  { name: 'Premolar',        color: '#00e5ff' },
  { name: 'Canine',          color: '#ff6b6b' },
  { name: 'Central Incisor', color: '#51cf66' },
  { name: 'Lateral Incisor', color: '#ffd43b' },
  { name: 'Molar',           color: '#cc5de8' },
  { name: 'Missing',         color: '#ff3d71' },
  { name: 'Wisdom Tooth',    color: '#74c0fc' },
];

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let model        = null;
let videoEl      = null;
let overlayCanvas= null;
let ctx          = null;
let animId       = null;
let confidenceThreshold = 0.40;
let useFrontCamera = true;
let stream       = null;
let simMode      = false;
let lastFpsTime  = performance.now();
let frameCount   = 0;
let currentFps   = 0;

// ─────────────────────────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────────────────────────
function setProgress(pct, text, sub) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = text;
  document.getElementById('progress-pct').textContent  = pct + '%';
  if (sub) document.getElementById('splash-status').textContent = sub;
}
function showStartButton() { document.getElementById('start-btn').style.display = 'block'; }
function showToast(msg, duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ─────────────────────────────────────────────────────────────
// DETECTION CHIPS
// ─────────────────────────────────────────────────────────────
function buildDetectionGrid() {
  const grid = document.getElementById('detection-grid');
  grid.innerHTML = '';
  CLASSES.forEach((cls, i) => {
    const chip = document.createElement('div');
    chip.className = 'det-chip';
    chip.id = 'chip-' + i;
    chip.style.borderColor = cls.color + '44';
    chip.style.color = cls.color;
    chip.innerHTML = `<div class="dot" style="background:${cls.color}"></div><span>${cls.name}</span>`;
    grid.appendChild(chip);
  });
}
function updateChips(detections) {
  const seen = new Set(detections.map(d => d.classId));
  CLASSES.forEach((_, i) => {
    const chip = document.getElementById('chip-' + i);
    if (chip) chip.classList.toggle('active', seen.has(i));
  });
}

// ─────────────────────────────────────────────────────────────
// MODEL LOADING
// ─────────────────────────────────────────────────────────────
async function loadModel() {
  if (typeof tflite === 'undefined') {
    setProgress(100, 'ERROR', 'TFLite package not loaded — check CDN');
    console.error('tflite is undefined');
    return null;
  }
  // Always set WASM path before loading
  tflite.setWasmPath('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.8/dist/');
  try {
    setProgress(15, 'Checking model URL…', 'Testing connection to model file');
    const probe = await fetch(MODEL_URL, { method: 'HEAD', mode: 'cors' });
    if (!probe.ok) {
      setProgress(100, 'ERROR', `Model URL returned ${probe.status}`);
      return null;
    }
  } catch(e) {
    setProgress(100, 'CORS ERROR', 'Cannot reach model: ' + e.message);
    console.error('Fetch probe failed:', e);
    return null;
  }
  try {
    setProgress(20, 'Fetching model…', 'Downloading from GitHub Releases (112MB)');
    const m = await tflite.loadTFLiteModel(MODEL_URL);
    setProgress(80, 'Warming up…', 'Running warm-up pass');
    const dummy = tf.zeros([1, INPUT_SIZE, INPUT_SIZE, 3]);
    m.predict(dummy); dummy.dispose();
    setProgress(100, 'Ready ✓', 'YOLOv8 loaded on-device');
    return m;
  } catch(e) {
    setProgress(100, 'LOAD ERROR', 'Failed: ' + e.message);
    console.error('Model load failed:', e);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────
// YOLOv8 OUTPUT PARSING
// Output shape: [1, 11, 8400]  →  rows: cx,cy,w,h, 7 class scores
// ─────────────────────────────────────────────────────────────
function parseYOLOv8(outputTensor, W, H) {
  const data     = outputTensor.dataSync();
  const numBoxes = 8400;
  const numCls   = CLASSES.length;
  const dets     = [];
  const scaleX   = W / INPUT_SIZE;
  const scaleY   = H / INPUT_SIZE;

  for (let i = 0; i < numBoxes; i++) {
    let bestScore = 0, bestClass = 0;
    for (let c = 0; c < numCls; c++) {
      const score = data[(4 + c) * numBoxes + i];
      if (score > bestScore) { bestScore = score; bestClass = c; }
    }
    if (bestScore < confidenceThreshold) continue;
    const cx = data[0 * numBoxes + i];
    const cy = data[1 * numBoxes + i];
    const w  = data[2 * numBoxes + i];
    const h  = data[3 * numBoxes + i];
    dets.push({
      x1: (cx - w/2) * INPUT_SIZE * scaleX,
      y1: (cy - h/2) * INPUT_SIZE * scaleY,
      x2: (cx + w/2) * INPUT_SIZE * scaleX,
      y2: (cy + h/2) * INPUT_SIZE * scaleY,
      score: bestScore, classId: bestClass,
    });
  }
  return nms(dets, IOU_THRESH).slice(0, MAX_DETS);
}

// ─────────────────────────────────────────────────────────────
// NMS
// ─────────────────────────────────────────────────────────────
function iou(a, b) {
  const ix1=Math.max(a.x1,b.x1), iy1=Math.max(a.y1,b.y1);
  const ix2=Math.min(a.x2,b.x2), iy2=Math.min(a.y2,b.y2);
  const iw=Math.max(0,ix2-ix1), ih=Math.max(0,iy2-iy1);
  const inter=iw*ih;
  return inter/((a.x2-a.x1)*(a.y2-a.y1)+(b.x2-b.x1)*(b.y2-b.y1)-inter+1e-6);
}
function nms(dets, thresh) {
  dets.sort((a,b)=>b.score-a.score);
  const keep=[], sup=new Set();
  for (let i=0;i<dets.length;i++) {
    if (sup.has(i)) continue;
    keep.push(dets[i]);
    for (let j=i+1;j<dets.length;j++) { if(iou(dets[i],dets[j])>thresh) sup.add(j); }
  }
  return keep;
}

// ─────────────────────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────────────────────
function drawDetections(dets) {
  const W=overlayCanvas.width, H=overlayCanvas.height;
  ctx.clearRect(0,0,W,H);
  dets.forEach(det => {
    const cls=CLASSES[det.classId], color=cls.color;
    const x=det.x1, y=det.y1, bw=det.x2-det.x1, bh=det.y2-det.y1;
    const conf=(det.score*100).toFixed(0);
    const label=`${cls.name}  ${conf}%`;

    // glow box
    ctx.save();
    ctx.shadowBlur=12; ctx.shadowColor=color;
    ctx.strokeStyle=color; ctx.lineWidth=2;
    ctx.strokeRect(x,y,bw,bh);
    ctx.restore();

    // fill
    ctx.fillStyle=color+'18'; ctx.fillRect(x,y,bw,bh);

    // corner accents
    const cs=10;
    ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=3; ctx.shadowBlur=8; ctx.shadowColor=color;
    [[x,y,1,1],[x+bw,y,-1,1],[x,y+bh,1,-1],[x+bw,y+bh,-1,-1]].forEach(([cx,cy,dx,dy])=>{
      ctx.beginPath(); ctx.moveTo(cx+dx*cs,cy); ctx.lineTo(cx,cy); ctx.lineTo(cx,cy+dy*cs); ctx.stroke();
    });
    ctx.restore();

    // label
    ctx.font='bold 11px "Space Mono",monospace';
    const tw=ctx.measureText(label).width, lh=18;
    const lx=x, ly=y>lh+2?y-lh-2:y+bh+2;
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.roundRect(lx,ly,tw+14,lh,3); ctx.fill();
    ctx.fillStyle='#000'; ctx.fillText(label,lx+7,ly+13);
  });
}

// ─────────────────────────────────────────────────────────────
// SIMULATION MODE
// ─────────────────────────────────────────────────────────────
let simTick=0;
function getSimDetections(W,H) {
  simTick++;
  const t=simTick*0.02;
  const cx=W*0.5+Math.sin(t*0.7)*W*0.05;
  const cy=H*0.55+Math.cos(t*0.5)*H*0.03;
  return [
    {classId:2,x1:cx-180,y1:cy-30,x2:cx-130,y2:cy+30,score:0.91},
    {classId:3,x1:cx-130,y1:cy-28,x2:cx-88, y2:cy+28,score:0.88},
    {classId:1,x1:cx-88, y1:cy-40,x2:cx-48, y2:cy+32,score:0.85},
    {classId:0,x1:cx-48, y1:cy-35,x2:cx-4,  y2:cy+30,score:0.79},
    {classId:0,x1:cx+4,  y1:cy-35,x2:cx+48, y2:cy+30,score:0.82},
    {classId:1,x1:cx+48, y1:cy-40,x2:cx+88, y2:cy+32,score:0.86},
    {classId:3,x1:cx+88, y1:cy-28,x2:cx+130,y2:cy+28,score:0.77},
    {classId:2,x1:cx+130,y1:cy-30,x2:cx+180,y2:cy+30,score:0.93},
    {classId:4,x1:cx-240,y1:cy-25,x2:cx-185,y2:cy+25,score:0.70},
    {classId:5,x1:cx+185,y1:cy-25,x2:cx+240,y2:cy+25,score:0.65},
  ].filter(d=>d.score>=confidenceThreshold);
}

// ─────────────────────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────────────────────
function updateStats(dets, inferenceMs) {
  document.getElementById('tooth-count').textContent = dets.length;
  document.getElementById('avg-conf').textContent = dets.length
    ? (dets.reduce((s,d)=>s+d.score,0)/dets.length*100).toFixed(0)+'%' : '—';
  if (inferenceMs!==null) document.getElementById('inf-time').textContent=inferenceMs.toFixed(1)+'ms';
  frameCount++;
  const now=performance.now(), delta=now-lastFpsTime;
  if (delta>=1000) {
    document.getElementById('fps-badge').textContent=Math.round(frameCount*1000/delta)+' FPS';
    frameCount=0; lastFpsTime=now;
  }
}

// ─────────────────────────────────────────────────────────────
// LOOP
// ─────────────────────────────────────────────────────────────
async function runLoop() {
  if (!videoEl||videoEl.readyState<2) { animId=requestAnimationFrame(runLoop); return; }
  const W=overlayCanvas.width=overlayCanvas.offsetWidth;
  const H=overlayCanvas.height=overlayCanvas.offsetHeight;
  let dets=[], inferenceMs=null;

  if (model) {
    try {
      const t0=performance.now();
      const inp=tf.tidy(()=>tf.image.resizeBilinear(tf.browser.fromPixels(videoEl),[INPUT_SIZE,INPUT_SIZE]).div(255.0).expandDims(0));
      const out=model.predict(inp);
      inferenceMs=performance.now()-t0;

      // DEBUG — log every 60 frames
      if (frameCount % 60 === 0) {
        const shape = Array.isArray(out) ? out[0].shape : out.shape;
        const data  = Array.isArray(out) ? out[0].dataSync() : out.dataSync();
        const maxVal = Math.max(...Array.from(data).slice(0, 10000));
        const minVal = Math.min(...Array.from(data).slice(0, 10000));
        console.log('Output shape:', shape);
        console.log('Output max (first 10k):', maxVal.toFixed(4));
        console.log('Output min (first 10k):', minVal.toFixed(4));
        console.log('Conf threshold:', confidenceThreshold);
      }

      dets=parseYOLOv8(Array.isArray(out) ? out[0] : out, W, H);
      inp.dispose();
      if (Array.isArray(out)) out.forEach(t=>t.dispose()); else out.dispose();
    } catch(e) { console.error('Inference error:',e); }
  } else if (simMode) {
    dets=getSimDetections(W,H);
  }

  drawDetections(dets);
  updateStats(dets,inferenceMs);
  updateChips(dets);
  animId=requestAnimationFrame(runLoop);
}

// ─────────────────────────────────────────────────────────────
// CAMERA
// ─────────────────────────────────────────────────────────────
async function startCamera(facingMode='user') {
  if (stream) stream.getTracks().forEach(t=>t.stop());
  try {
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode,width:{ideal:1280},height:{ideal:720}}, audio:false
    });
    videoEl.srcObject=stream;
    const mirror=facingMode==='user'?'scaleX(-1)':'none';
    videoEl.style.transform=mirror;
    overlayCanvas.style.transform=mirror;
    return true;
  } catch(e) { showToast('Camera error: '+e.message); return false; }
}
function toggleCamera() { useFrontCamera=!useFrontCamera; startCamera(useFrontCamera?'user':'environment'); }
function updateThreshold(val) {
  confidenceThreshold=val/100;
  document.getElementById('threshold-val').textContent=confidenceThreshold.toFixed(2);
}

// ─────────────────────────────────────────────────────────────
// START
// ─────────────────────────────────────────────────────────────
async function startAR() {
  document.getElementById('splash').classList.add('hidden');
  setTimeout(()=>document.getElementById('splash').style.display='none',700);
  document.getElementById('app').classList.add('active');
  videoEl=document.getElementById('video');
  overlayCanvas=document.getElementById('overlay');
  ctx=overlayCanvas.getContext('2d');
  await startCamera('user');
  if (!model) { simMode=true; showToast('Simulation mode — model loading failed',5000); }
  runLoop();
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
(async()=>{
  buildDetectionGrid();
  setProgress(5,'Loading TF.js…','Initialising TensorFlow.js');
  await tf.ready();
  setProgress(15,'TF.js ready','TensorFlow.js loaded');
  model=await loadModel();
  if (!model) setProgress(100,'Ready (sim)','Model unavailable — simulation mode active');
  showStartButton();
})();
</script>
