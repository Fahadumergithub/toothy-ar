<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toothy AR — Deep Diagnostic</title>
<style>
  body { background:#0a0a0f; color:#e8e8f0; font-family:'Space Mono',monospace; padding:20px; font-size:12px; }
  pre  { background:#13131a; border:1px solid #1e1e2e; padding:12px; border-radius:6px; white-space:pre-wrap; word-break:break-all; margin:4px 0; line-height:1.6; }
  h3   { color:#00e5ff; margin:18px 0 6px; font-size:13px; }
  .ok  { color:#51cf66; } .warn { color:#ffd43b; } .err { color:#ff3d71; }
  button { background:#00e5ff; color:#000; border:none; padding:12px 28px; border-radius:4px;
           font-family:'Space Mono',monospace; font-weight:700; cursor:pointer; margin:6px 4px; }
</style>
</head>
<body>
<h2>🦷 Deep Diagnostic</h2>
<button onclick="runDiag()">▶ Run Full Diagnostic</button>
<div id="out"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/tf-tflite.min.js"></script>
<script>
const MODEL_URL = 'https://huggingface.co/fahadumer/toothy-ar/resolve/main/best_float32.tflite';

const el = document.getElementById('out');
function log(msg, cls='') { el.innerHTML += `<pre class="${cls}">${msg}</pre>`; }
function h(t) { el.innerHTML += `<h3>${t}</h3>`; }

function stats(arr) {
  const a = Array.from(arr);
  const nz = a.filter(v => v !== 0).length;
  const mn = Math.min(...a).toFixed(5);
  const mx = Math.max(...a).toFixed(5);
  const mean = (a.reduce((s,v)=>s+v,0)/a.length).toFixed(5);
  return `total=${a.length}  non-zero=${nz}  min=${mn}  max=${mx}  mean=${mean}`;
}

async function extractTensor(raw) {
  // Handle all possible return types from tfjs-tflite predict()
  if (raw instanceof tf.Tensor) return raw;
  if (Array.isArray(raw)) return raw[0];
  if (typeof raw === 'object') {
    const keys = Object.keys(raw);
    log('⚠️  predict() returned NAMED MAP with keys: ' + JSON.stringify(keys), 'warn');
    return raw[keys[0]];
  }
  return null;
}

async function runDiag() {
  el.innerHTML = '';
  tflite.setWasmPath('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/');
  await tf.ready();
  log('TF backend: ' + tf.getBackend(), 'ok');

  h('1 — Load model');
  let m;
  try {
    m = await tflite.loadTFLiteModel(MODEL_URL);
    log('✅ Model loaded', 'ok');
  } catch(e) { log('❌ ' + e, 'err'); return; }

  // ── TEST A: dataSync() (current approach — may be broken) ──
  h('2 — Test A: dataSync() on random input');
  const inp_a = tf.randomUniform([1,640,640,3], 0, 1);
  const raw_a = m.predict(inp_a);
  const t_a   = await extractTensor(raw_a);
  log('Shape: ' + JSON.stringify(t_a.shape) + '  dtype: ' + t_a.dtype);
  const sync_a = t_a.dataSync();
  log('dataSync() → ' + stats(sync_a));
  log('First 10 values: ' + Array.from(sync_a).slice(0,10).map(v=>v.toFixed(4)).join(', '));

  // ── TEST B: async data() — the correct async method ──
  h('3 — Test B: await tensor.data() [ASYNC — more reliable with WASM]');
  const inp_b = tf.randomUniform([1,640,640,3], 0, 1);
  const raw_b = m.predict(inp_b);
  const t_b   = await extractTensor(raw_b);
  const async_b = await t_b.data(); // <-- async version, waits for WASM memory sync
  log('data() [async] → ' + stats(async_b));
  log('First 10 values: ' + Array.from(async_b).slice(0,10).map(v=>v.toFixed(4)).join(', '));

  if (t_b.shape.length === 3) {
    const [B, R, C] = t_b.shape;
    h('4 — Row-by-row breakdown (async data)');
    log(`Layout: [batch=${B}, rows=${R}, anchors=${C}]`);
    for (let r = 0; r < R; r++) {
      const row = [];
      for (let c = 0; c < C; c++) row.push(async_b[r*C+c]);
      const nz = row.filter(v=>v!==0).length;
      const mn = Math.min(...row).toFixed(4);
      const mx = Math.max(...row).toFixed(4);
      const sample = row.slice(0,6).map(v=>v.toFixed(4)).join(', ');
      const label = r < 4 ? `box[${['cx','cy','w','h'][r]}]` : `class[${r-4}]`;
      log(`  row ${String(r).padStart(2)} (${label}): min=${mn} max=${mx} non-zero=${nz}  sample=[${sample}]`);
    }
  }

  // ── TEST C: uint8 input (no normalization) ──
  h('5 — Test C: uint8-range input [0–255] — no /255 normalization');
  const inp_c = tf.randomUniform([1,640,640,3], 0, 255);
  const raw_c = m.predict(inp_c);
  const t_c   = await extractTensor(raw_c);
  const async_c = await t_c.data();
  log('data() [async] → ' + stats(async_c));
  if (t_c.shape.length === 3) {
    const [B,R,C] = t_c.shape;
    for (let r = 0; r < R; r++) {
      const row = [];
      for (let c = 0; c < C; c++) row.push(async_c[r*C+c]);
      const nz = row.filter(v=>v!==0).length;
      log(`  row ${String(r).padStart(2)}: min=${Math.min(...row).toFixed(4)} max=${Math.max(...row).toFixed(4)} non-zero=${nz}`);
    }
  }

  // ── TEST D: int8 / quantized input check ──
  h('6 — Test D: check model input dtype');
  try {
    // Try passing int32 tensor
    const inp_d = tf.randomUniform([1,640,640,3], 0, 255).toInt();
    const raw_d = m.predict(inp_d);
    const t_d   = await extractTensor(raw_d);
    const async_d = await t_d.data();
    log('int input → ' + stats(async_d));
    inp_d.dispose(); if(Array.isArray(raw_d)) raw_d.forEach(t=>t.dispose()); else raw_d.dispose();
  } catch(e) { log('int input → ERROR: ' + e.message, 'warn'); }

  // ── cleanup ──
  inp_a.dispose(); if(Array.isArray(raw_a)) raw_a.forEach(t=>t.dispose()); else { try{t_a.dispose()}catch(e){} }
  inp_b.dispose(); if(Array.isArray(raw_b)) raw_b.forEach(t=>t.dispose()); else { try{t_b.dispose()}catch(e){} }
  inp_c.dispose(); if(Array.isArray(raw_c)) raw_c.forEach(t=>t.dispose()); else { try{t_c.dispose()}catch(e){} }

  h('✅ Done — paste all output above to Claude');
}
</script>
</body>
</html>
