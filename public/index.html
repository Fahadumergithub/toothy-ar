<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dental AR Detection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>

<script src="https://unpkg.com/@tensorflow/tfjs-tflite@0.0.1-alpha.9/dist/tf-tflite.min.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

#container{
position:relative;
width:100%;
max-width:900px;
margin:auto;
}

video{
width:100%;
border-radius:10px;
}

canvas{
position:absolute;
top:0;
left:0;
}

#controls{
margin-top:10px;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#111827;
border-radius:6px;
margin:5px;
font-size:14px;
}

</style>

</head>

<body>

<h2>Dental AR Detection</h2>

<div id="container">

<video id="video" autoplay playsinline muted></video> <canvas id="overlay"></canvas>

</div>

<div id="controls">

<button id="startBtn">Start Camera</button> <button id="stopBtn">Stop</button>

</div>

<div>

<span class="badge">FPS: <span id="fps">0</span></span> <span class="badge">Inference: <span id="time">0</span> ms</span>

</div>

<script>

const MODEL_URL =
"https://huggingface.co/Fahadumergithub/toothy-ar/resolve/main/best_float32.tflite";

const INPUT_SIZE = 640;
const CONFIDENCE_THRESHOLD = 0.35;

let model;
let video = document.getElementById("video");
let canvas = document.getElementById("overlay");
let ctx = canvas.getContext("2d");

let animationId;
let frameCount = 0;
let lastTime = performance.now();

const classNames = [
"Tooth",
"Caries",
"Restoration",
"Implant"
];

async function loadModel(){

console.log("Loading model...");

model = await tflite.loadTFLiteModel(MODEL_URL);

console.log("Model loaded");

}

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:{ideal:1280},
height:{ideal:720}
}
});

video.srcObject = stream;

await video.play();

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

detectFrame();

}

function stopCamera(){

cancelAnimationFrame(animationId);

if(video.srcObject){

video.srcObject.getTracks().forEach(track=>track.stop());

}

}

function drawDetections(detections){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.lineWidth = 2;
ctx.font = "16px Arial";
ctx.strokeStyle = "lime";
ctx.fillStyle = "lime";

detections.forEach(det=>{

let x = det.x;
let y = det.y;
let w = det.w;
let h = det.h;

ctx.strokeRect(x,y,w,h);

let label =
det.label + " " + (det.score*100).toFixed(1)+"%";

ctx.fillText(label,x,y-5);

});

}

function parseYOLO(output){

const data = output.dataSync();

const numPred = data.length / 85;

let detections = [];

for(let i=0;i<numPred;i++){

let offset = i*85;

let objScore = data[offset+4];

if(objScore < CONFIDENCE_THRESHOLD) continue;

let x = data[offset];
let y = data[offset+1];
let w = data[offset+2];
let h = data[offset+3];

let bestClass = 0;
let bestProb = 0;

for(let c=5;c<85;c++){

let prob = data[offset+c];

if(prob > bestProb){

bestProb = prob;
bestClass = c-5;

}

}

let score = bestProb * objScore;

if(score < CONFIDENCE_THRESHOLD) continue;

let scaleX = canvas.width / INPUT_SIZE;
let scaleY = canvas.height / INPUT_SIZE;

detections.push({

x:(x - w/2)*scaleX,
y:(y - h/2)*scaleY,
w:w*scaleX,
h:h*scaleY,
label:classNames[bestClass] || "Tooth",
score:score

});

}

return detections;

}

async function detectFrame(){

if(!model || video.readyState !== 4){

animationId = requestAnimationFrame(detectFrame);
return;

}

const start = performance.now();

const input = tf.tidy(()=>{

let img = tf.browser.fromPixels(video);

let resized = tf.image.resizeBilinear(img,[INPUT_SIZE,INPUT_SIZE]);

let normalized = resized.toFloat().div(255);

return normalized.expandDims(0);

});

const output = model.predict(input);

const detections = parseYOLO(output);

drawDetections(detections);

input.dispose();
output.dispose();

const inference = performance.now() - start;

document.getElementById("time").textContent =
inference.toFixed(1);

frameCount++;

const now = performance.now();

if(now - lastTime > 1000){

document.getElementById("fps").textContent = frameCount;

frameCount = 0;

lastTime = now;

}

animationId = requestAnimationFrame(detectFrame);

}

document
.getElementById("startBtn")
.addEventListener("click",async()=>{

await loadModel();

await startCamera();

});

document
.getElementById("stopBtn")
.addEventListener("click",stopCamera);

</script>

</body>
</html>
